<!doctype html>
<!-- player.html — mini-player for archive.org videos that AREN'T in the item's web player
     (no derivative was ever made: .mkv/.avi/.wmv originals). Chromium plays Matroska natively,
     so streaming the original beats forcing a download for 93% of these. This page must stay
     OUTSIDE the site's COEP isolation (see _headers /player.html override + server.mjs): the
     cross-origin video stream has no CORP/CORS headers, so a COEP'd page would block it. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terry A. Davis — archive player</title>
  <style>
    @font-face { font-family:'dos_vga'; src:url('fonts/dos_vga_new.woff2') format('woff2'); font-display:swap; }
    :root { --blue:#0000aa; --red:#aa0000; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { height:100%; }
    body { background:var(--blue); color:#fff; font-family:'dos_vga','TempleOS',monospace; font-size:16px;
           display:flex; flex-direction:column; gap:10px; padding:14px; }
    h1 { font-size:16px; font-weight:normal; color:yellow; word-break:break-word; }
    h1 small { color:#fff; }
    #wrap { flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center; background:#000;
            border:4px double #fff; }
    video { max-width:100%; max-height:100%; outline:none; background:#000; }
    #msg { display:none; padding:24px; max-width:640px; line-height:1.5; }
    #msg b { color:yellow; }
    #bar { display:flex; gap:14px; flex-wrap:wrap; }
    a { color:yellow; }
    a.btn { background:#fff; color:#000; text-decoration:none; padding:3px 10px; border:2px solid #fff; }
    a.btn:hover { border-color:yellow; }
  </style>
</head>
<body>
  <h1 id="title">…</h1>
  <div id="wrap">
    <video id="v" controls autoplay playsinline preload="metadata"></video>
    <div id="msg"></div>
  </div>
  <div id="bar">
    <a class="btn" id="dl" href="#" download>↓ download the file</a>
    <a class="btn" href="https://archive.org/details/TerryADavis_TempleOS_Archive" target="_blank" rel="noopener">archive.org item</a>
    <a class="btn" href="./">← TempleOS-wasm</a>
  </div>
  <script>
    const P = new URLSearchParams(location.search);
    const f = P.get("f") || "", t = Math.max(0, Number(P.get("t")) || 0), name = P.get("n") || f.split("/").pop();
    const src = "https://archive.org/download/TerryADavis_TempleOS_Archive/" + f.split("/").map(encodeURIComponent).join("/");
    const v = document.getElementById("v"), msg = document.getElementById("msg");
    const hms = (s) => { s |= 0; const h = (s / 3600) | 0, m = ((s % 3600) / 60) | 0, ss = s % 60;
      return (h ? h + ":" + String(m).padStart(2, "0") : m) + ":" + String(ss).padStart(2, "0"); };
    document.getElementById("title").textContent = name + (t ? " — from " + hms(t) : "");
    document.title = name + " — Terry A. Davis";
    document.getElementById("dl").href = src;
    if (!f) { v.style.display = "none"; msg.style.display = "block"; msg.textContent = "no video specified."; }
    else {
      v.src = src + (t ? "#t=" + t : "");
      // some servers ignore media fragments on this container — seek again once metadata is in
      v.addEventListener("loadedmetadata", () => { if (t && Math.abs(v.currentTime - t) > 2) { try { v.currentTime = t; } catch {} } });
      v.addEventListener("error", () => {
        v.style.display = "none"; msg.style.display = "block";
        const ext = (f.split(".").pop() || "").toLowerCase();
        msg.innerHTML = "<b>This browser can't decode this file.</b><br><br>" +
          "It's a <b>." + ext.replace(/[^a-z0-9]/g, "") + "</b> original from the archive — archive.org never " +
          "transcoded it for the web, and this container needs Chrome / Edge (Matroska) or a media player. " +
          "Use <b>↓ download the file</b> below and open it in VLC or mpv — the timestamp you wanted is <b>" + hms(t) + "</b>.";
      });
    }
  </script>
</body>
</html>
